<!DOCTYPE html>
<html>
<head>
  <title>Test Assets</title>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      background: #eaeaea;
    }
    .container {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .box {
      border: 2px dashed #000;
      padding: 10px;
      text-align: center;
    }
    .bg-white { background-color: #ffffff; color: #000; }
    .bg-black { background-color: #000000; color: #fff; }
    .bg-pink { background-color: #fcd6d3; color: #000; }
    .bg-dark-pink { background-color: #8c6f66; color: #fff; }
    img {
      width: 72px;
      height: 72px;
      image-rendering: pixelated;
      display: block;
      margin: 10px auto;
    }
  </style>
</head>
<body>
  <h1>Asset Color Test</h1>
  
  <h2>1. plushabit.png</h2>
  <div class="container">
    <div class="box bg-white">White BG<img src="src/assets/plushabit.png" /></div>
    <div class="box bg-black">Black BG<img src="src/assets/plushabit.png" /></div>
    <div class="box bg-pink">Pastel Pink BG<img src="src/assets/plushabit.png" /></div>
    <div class="box bg-dark-pink">Dark Pink BG<img src="src/assets/plushabit.png" /></div>
  </div>

  <h2>2. xbutton.png</h2>
  <div class="container">
    <div class="box bg-white">White BG<img src="src/assets/xbutton.png" /></div>
    <div class="box bg-black">Black BG<img src="src/assets/xbutton.png" /></div>
    <div class="box bg-pink">Pastel Pink BG<img src="src/assets/xbutton.png" /></div>
    <div class="box bg-dark-pink">Dark Pink BG<img src="src/assets/xbutton.png" /></div>
  </div>

  <h2>3. habit.png</h2>
  <div class="container">
    <div class="box bg-white">White BG<img src="src/assets/habit.png" /></div>
    <div class="box bg-black">Black BG<img src="src/assets/habit.png" /></div>
    <div class="box bg-pink">Pastel Pink BG<img src="src/assets/habit.png" /></div>
    <div class="box bg-dark-pink">Dark Pink BG<img src="src/assets/habit.png" /></div>
  </div>
</body>
</html>
